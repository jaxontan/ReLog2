name: relog2
description: "ReLog2 — travel-album map-marker memories app"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^17.3.0
  flutter_riverpod: ^3.3.2
  riverpod: ^3.3.2
  camera: ^0.12.0+1
  record: ^7.1.1
  flutter_map: ^8.3.1
  latlong2: ^0.10.1
  geolocator: ^14.0.3
  crypto: ^3.0.6
  supabase_flutter: ^2.16.0
  intl: ^0.19.0
  just_audio: ^0.9.36
  video_player: ^2.9.2
  firebase_core: ^4.0.0
  firebase_messaging: ^16.0.0
  flutter_local_notifications: ^19.2.0
  image_picker: ^1.1.2
  flutter_markdown: ^0.7.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
