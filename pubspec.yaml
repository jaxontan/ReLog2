name: relog2
description: "ReLog2 — travel-album map-marker memories app"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  firebase_storage: ^13.4.3
  cloud_firestore: ^6.6.0
  google_sign_in: ^7.2.0
  go_router: ^17.3.0
  flutter_riverpod: ^3.3.2
  camera: ^0.12.0+1
  record: ^7.1.1
  flutter_map: ^8.3.1
  latlong2: ^0.10.1
  geolocator: ^14.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
